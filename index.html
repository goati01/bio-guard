<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Guard 16.5 | Final Master Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 響應式佈局邏輯 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            #sidebar { width: 100% !important; height: auto !important; padding: 15px !important; box-shadow: none !important; }
            #main-content { height: 350px !important; width: 100% !important; order: -1; }
            
            #dashboard { 
                position: fixed !important; 
                top: 20px !important; 
                right: 20px !important; 
                width: 340px !important; 
                z-index: 5000 !important; 
                touch-action: none !important; /* 禁止瀏覽器接管手勢 */
                background: rgba(255,255,255,0.98) !important;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2) !important;
            }
        }

        #sidebar { width: 380px; background: white; padding: 25px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); overflow-y: auto; z-index: 1000; flex-shrink: 0; }
        #main-content { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #1a1a1a; }
        .api-panel { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        #dashboard { position: absolute; top: 20px; right: 20px; width: 360px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 2000; border: 1px solid rgba(255,255,255,0.3); }
        .mgi-card { background: var(--primary); padding: 20px; border-radius: 15px; text-align: center; color: white; margin-bottom: 15px; cursor: grab; }
        .mgi-value { font-size: 3.5rem; font-weight: 900; display: block; line-height: 1; margin: 5px 0; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; margin-top: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        #photo_input, canvas { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="margin-bottom: 15px;">
        <select id="lang_select" onchange="changeLanguage()" style="background: var(--accent); color: white; border: none; font-weight: 800; padding: 5px; border-radius: 4px;">
            <option value="zh">繁體中文 (Traditional Chinese)</option>
            <option value="en">English (Professional)</option>
        </select>
    </div>
    <h2 style="margin: 0 0 15px; font-size: 1.3rem;">Bio-Guard <span style="color:var(--accent)">16.5</span></h2>
    
    <div class="api-panel">
        <input type="password" id="cwa_key" placeholder="CWA API Key (台灣)" onchange="saveKeys()" style="margin-bottom:8px">
        <input type="password" id="global_key" placeholder="OpenWeather Key (全球)" onchange="saveKeys()" style="margin-bottom:8px">
        <input type="password" id="gemini_key" placeholder="Gemini API Key (智庫)" onchange="saveKeys()">
    </div>

    <div id="station-info" style="background: #eff6ff; padding: 12px; border-radius: 10px; font-size: 0.75rem; color: #1e40af;">請點擊地圖鎖定座標</div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;">
        <button class="btn" style="background:#0f172a; color:white;" onclick="syncCwa()">🇹🇼 測站同步</button>
        <button class="btn" style="background:#3b82f6; color:white;" onclick="syncGlobal()">🌐 全球同步</button>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <div style="flex:1;"><label style="font-size:0.75rem;">溫度 (°C)</label><input type="number" id="temp" value="24.0" oninput="runDiagnosis()"></div>
        <div style="flex:1;"><label style="font-size:0.75rem;">濕度 (%)</label><input type="number" id="rh" value="70" oninput="runDiagnosis()"></div>
    </div>

    <div style="margin-top:15px;">
        <label style="font-size:0.75rem;">材料敏感等級 (物理校準)</label>
        <select id="mat_info" onchange="runDiagnosis()"></select>
    </div>

    <div id="chart-container" style="height: 180px; margin-top:15px;"><canvas id="radarChart"></canvas></div>
</div>

<div id="main-content">
    <div id="map"></div>
    <div id="dashboard">
        <div id="mgi-box" class="mgi-card">
            <small style="opacity:0.8; font-weight:600">學術發霉指數 (MGI)</small>
            <span id="mgi-value" class="mgi-value">--</span>
            <div id="cost-box" style="font-size: 0.7rem; font-weight: 800; padding: 4px; border-radius: 6px; margin-top: 5px; background:rgba(255,255,255,0.2)">數據解析中...</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn" style="background:var(--primary); color:white;" onclick="handleAiDiagnosis()">🤖 智庫診斷</button>
            <button class="btn" style="background:var(--success); color:white;" onclick="triggerPhoto()">📸 拍照存檔</button>
        </div>
        <div id="ai-report" style="margin-top:12px; font-size:0.88rem; line-height:1.7; display:none; background:white; padding:15px; border-radius:10px;"></div>
    </div>
</div>

<input type="file" id="photo_input" accept="image/*" capture="camera">
<canvas id="watermark_canvas"></canvas>

<script>
    const i18n = {
        zh: { high_risk: "⚠️ 臨界風險", low_risk: "✅ 物理穩定", sync_ok: "✅ 同步成功！", materials: ["極敏感 (原木/皮革)", "敏感 (系統櫃/合板)", "抗性 (混凝土/紅磚)", "高抗性 (金屬/玻璃)"], chart_labels: ['濕度', '地脈', '通風', '材料', '風險'], enter_global: "請輸入全球 API Key" },
        en: { high_risk: "⚠️ Critical", low_risk: "✅ Stable", sync_ok: "✅ Sync OK", materials: ["Very Sensitive", "Sensitive", "Resistant", "High Resistant"], chart_labels: ['Humidity', 'Ground', 'Ventilation', 'Material', 'MGI'], enter_global: "Enter Global API Key" }
    };

    let currentLang = 'zh', radarChart, marker, clickedCoords;

    function changeLanguage() {
        currentLang = document.getElementById('lang_select').value;
        const d = i18n[currentLang];
        const updateSelect = (id, options, values) => {
            const sel = document.getElementById(id); const cur = sel.value; sel.innerHTML = "";
            options.forEach((opt, i) => { let o = document.createElement("option"); o.value = values[i]; o.text = opt; if(o.value === cur) o.selected = true; sel.add(o); });
        };
        updateSelect('mat_info', d.materials, ['1.6','1.25','0.75','0.3']);
        runDiagnosis();
    }

    var map = L.map('map', { zoomControl: false }).setView([24.8138, 120.9675], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    map.on('click', (e) => {
        clickedCoords = e.latlng; if (marker) map.removeLayer(marker); marker = L.marker(clickedCoords).addTo(map);
        document.getElementById('station-info').innerText = `Lat: ${clickedCoords.lat.toFixed(4)} / Lng: ${clickedCoords.lng.toFixed(4)}`;
        runDiagnosis();
    });

    function runDiagnosis() {
        const rh = parseFloat(document.getElementById('rh').value) || 0;
        const mat = parseFloat(document.getElementById('mat_info').value) || 1.25;
        const lat = clickedCoords ? clickedCoords.lat : 24.8;
        let creg = (lat > 24.7 && lat < 24.9) ? 1.45 : (lat > 25.1 ? 1.5 : 1.1);
        let base = Math.max(0, rh - 55);
        let mgi = Math.pow(base, 1.3) * (mat * creg * 0.3);
        mgi = Math.min(Math.max(mgi, 0), 100);
        document.getElementById('mgi-value').innerText = Math.round(mgi);
        document.getElementById('mgi-box').style.background = mgi > 65 ? 'var(--danger)' : (mgi > 30 ? 'var(--warning)' : 'var(--success)');
        document.getElementById('cost-box').innerText = mgi > 65 ? i18n[currentLang].high_risk : i18n[currentLang].low_risk;
        updateRadar(rh, mgi);
    }

    function triggerPhoto() { document.getElementById('photo_input').click(); }
    document.getElementById('photo_input').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('watermark_canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const fontSize = canvas.width * 0.035;
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(20, canvas.height - fontSize * 6, fontSize * 20, fontSize * 5);
                ctx.fillStyle = "white"; ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.fillText(`MGI: ${document.getElementById('mgi-value').innerText} | RH: ${document.getElementById('rh').value}%`, 40, canvas.height - fontSize * 4);
                ctx.fillText(`GEO: ${clickedCoords ? clickedCoords.lat.toFixed(4)+','+clickedCoords.lng.toFixed(4) : 'OFFLINE'}`, 40, canvas.height - fontSize * 2.5);
                ctx.fillText(`TIME: ${new Date().toLocaleString()}`, 40, canvas.height - fontSize * 1);
                const link = document.createElement('a'); link.download = `BioGuard_${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9); link.click();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    async function handleAiDiagnosis() {
        const key = document.getElementById('gemini_key').value;
        const report = document.getElementById('ai-report');
        if (!key) {
            report.style.display = "block";
            report.innerHTML = "<b>本地專家分析：</b><br>檢測到材料表面 EMC 飽和，新竹區域建議強制除濕至 50% 以對抗冷橋效應。";
            return;
        }
        report.style.display = "block"; report.innerHTML = "智庫連線中...";
        try {
            const prompt = `分析發霉指數 MGI ${document.getElementById('mgi-value').innerText}, RH ${document.getElementById('rh').value}%. 材料：${document.getElementById('mat_info').selectedOptions[0].text}. 提供具體動作。用繁體中文。`;
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${key}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}) });
            const res = await resp.json();
            report.innerHTML = res.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
        } catch (e) { report.innerHTML = "連線失敗，請檢查金鑰。"; }
    }

    async function syncGlobal() {
        const key = document.getElementById('global_key').value;
        if(!key) return alert(i18n[currentLang].enter_global);
        if(!clickedCoords) return alert("請先點擊地圖");
        try {
            const resp = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${clickedCoords.lat}&lon=${clickedCoords.lng}&appid=${key}&units=metric`);
            const data = await resp.json();
            document.getElementById('temp').value = data.main.temp;
            document.getElementById('rh').value = data.main.humidity;
            runDiagnosis();
        } catch (e) { alert("API 錯誤"); }
    }

    function updateRadar(rh, mgi) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, { type: 'radar', data: { labels: i18n[currentLang].chart_labels, datasets: [{ data: [rh, 50, 50, 50, mgi], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
    }

    function saveKeys() { localStorage.setItem('cwa_key', document.getElementById('cwa_key').value); localStorage.setItem('global_key', document.getElementById('global_key').value); localStorage.setItem('gemini_key', document.getElementById('gemini_key').value); }
    
    // --- 🚨 最終指針鎖定：全向自由拖動核心 ---
    window.onload = function() {
        document.getElementById('cwa_key').value = localStorage.getItem('cwa_key') || "";
        document.getElementById('global_key').value = localStorage.getItem('global_key') || "";
        document.getElementById('gemini_key').value = localStorage.getItem('gemini_key') || "";
        changeLanguage();
        
        const el = document.getElementById('dashboard');
        if (window.innerWidth <= 768) {
            let startX, startY, initialLeft, initialTop;
            
            el.addEventListener('pointerdown', function(e) {
                if (['BUTTON', 'SELECT', 'INPUT'].includes(e.target.tagName)) return;
                
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = el.offsetLeft;
                initialTop = el.offsetTop;
                
                el.setPointerCapture(e.pointerId); // 暴力奪取所有指針數據
                el.style.transition = "none";
            });

            el.addEventListener('pointermove', function(e) {
                if (!el.hasPointerCapture(e.pointerId)) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                let newX = initialLeft + dx;
                let newY = initialTop + dy;
                
                // 限制在視窗內
                newX = Math.max(0, Math.min(newX, window.innerWidth - el.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - el.offsetHeight));
                
                el.style.left = newX + 'px';
                el.style.top = newY + 'px';
                el.style.right = 'auto'; // 清除初始右定位衝突
                el.style.bottom = 'auto';
            });

            el.addEventListener('pointerup', function(e) {
                el.releasePointerCapture(e.pointerId);
                el.style.transition = "0.3s";
            });
        }
    };
</script>
</body>
</html>
