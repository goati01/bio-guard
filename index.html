<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Guard 16.5 | Final Field Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; height: 100vh; }
            #sidebar { width: 100% !important; height: 40% !important; padding: 15px !important; overflow-y: auto; z-index: 1000; flex-shrink: 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
            #main-content { flex-grow: 1 !important; height: 60% !important; width: 100% !important; order: -1; position: relative; }
            #dashboard { 
                position: fixed !important; 
                top: 20px; right: 20px; 
                width: 320px !important; 
                z-index: 9999 !important; 
                background: rgba(255,255,255,0.95); 
                box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
                touch-action: none !important; /* 核心：禁止所有系統手勢 */
            }
        }

        #sidebar { width: 380px; background: white; padding: 25px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); overflow-y: auto; z-index: 1000; }
        #main-content { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        #dashboard { position: absolute; top: 20px; right: 20px; width: 360px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; z-index: 2000; border: 1px solid rgba(255,255,255,0.3); }
        
        /* 拖拽握把：藍色卡片區域 */
        .drag-handle { 
            background: var(--primary); padding: 20px; border-radius: 15px; text-align: center; color: white; 
            cursor: grab; touch-action: none !important; user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }
        
        .mgi-value { font-size: 3.2rem; font-weight: 900; display: block; line-height: 1; margin: 5px 0; }
        .input-group { margin-bottom: 10px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        #ai-report { margin-top: 10px; padding: 12px; background: #fff; border-radius: 10px; font-size: 0.85rem; line-height: 1.6; display: none; max-height: 200px; overflow-y: auto; border: 1px solid #eee; }
        #photo_input, canvas { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <select id="lang_select" onchange="changeLanguage()" style="background: var(--accent); color: white; border: none; font-weight: 800; padding: 5px; border-radius: 4px; width: auto; margin-bottom: 10px;">
        <option value="zh">繁體中文</option><option value="en">English</option>
    </select>
    <h2 style="margin: 0 0 10px; font-size: 1.2rem;">Bio-Guard <span style="color:var(--accent)">16.5</span></h2>
    <input type="password" id="cwa_key" placeholder="CWA API Key" onchange="saveKeys()" style="margin-bottom:8px">
    <input type="password" id="global_key" placeholder="OpenWeather Key" onchange="saveKeys()" style="margin-bottom:8px">
    <input type="password" id="gemini_key" placeholder="Gemini API Key" onchange="saveKeys()">
    <div id="station-info" style="background: #eff6ff; padding: 10px; border-radius: 8px; font-size: 0.7rem; margin-top: 10px;">請點擊地圖鎖定座標</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
        <button class="btn" style="background:#0f172a; color:white; font-size:0.75rem;" onclick="syncCwa()">🇹🇼 測站同步</button>
        <button class="btn" style="background:#3b82f6; color:white; font-size:0.75rem;" onclick="syncGlobal()">🌐 全球同步</button>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex:1;"><label style="font-size:0.7rem;">溫度</label><input type="number" id="temp" value="24.0" oninput="runDiagnosis()"></div>
        <div style="flex:1;"><label style="font-size:0.7rem;">濕度</label><input type="number" id="rh" value="70" oninput="runDiagnosis()"></div>
    </div>
    <div style="margin-top:10px;">
        <label style="font-size:0.7rem;">材料等級</label><select id="mat_info" onchange="runDiagnosis()"></select>
    </div>
    <div id="chart-container" style="height: 150px; margin-top:10px;"><canvas id="radarChart"></canvas></div>
</div>

<div id="main-content">
    <div id="map"></div>
    <div id="dashboard">
        <div id="drag_handle" class="drag-handle">
            <small style="opacity:0.8; font-weight:600; pointer-events:none;">按住此處可全向移動 (MGI)</small>
            <span id="mgi-value" class="mgi-value" style="pointer-events:none;">--</span>
            <div id="cost-box" style="font-size: 0.7rem; font-weight: 800; padding: 4px; border-radius: 6px; background:rgba(255,255,255,0.2); pointer-events:none;">數據解析中...</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
            <button class="btn" style="background:var(--primary); color:white; padding:8px;" onclick="handleAiDiagnosis()">🤖 診斷</button>
            <button class="btn" style="background:var(--success); color:white; padding:8px;" onclick="triggerPhoto()">📸 拍照</button>
        </div>
        <div id="ai-report"></div>
    </div>
</div>

<input type="file" id="photo_input" accept="image/*" capture="camera">
<canvas id="watermark_canvas"></canvas>

<script>
    const i18n = { zh: { materials: ["極敏感", "敏感", "中度抗性", "高抗性"], chart: ['濕度', '地脈', '通風', '材料', '風險'] }, en: { materials: ["Very Sensitive", "Sensitive", "Medium", "Resistant"], chart: ['Humidity', 'Ground', 'Ventilation', 'Material', 'MGI'] } };
    let currentLang = 'zh', radarChart, marker, clickedCoords;

    function changeLanguage() {
        currentLang = document.getElementById('lang_select').value;
        const d = i18n[currentLang];
        const sel = document.getElementById('mat_info'); sel.innerHTML = "";
        d.materials.forEach((opt, i) => { let o = document.createElement("option"); o.value = [1.6,1.25,0.75,0.3][i]; o.text = opt; sel.add(o); });
        runDiagnosis();
    }

    var map = L.map('map', { zoomControl: false }).setView([24.8138, 120.9675], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    map.on('click', (e) => {
        clickedCoords = e.latlng; if (marker) map.removeLayer(marker); marker = L.marker(clickedCoords).addTo(map);
        document.getElementById('station-info').innerText = `Lat: ${clickedCoords.lat.toFixed(4)} / Lng: ${clickedCoords.lng.toFixed(4)}`;
        runDiagnosis();
    });

    function runDiagnosis() {
        const rh = parseFloat(document.getElementById('rh').value) || 0;
        const mat = parseFloat(document.getElementById('mat_info').value) || 1.25;
        const lat = clickedCoords ? clickedCoords.lat : 24.8;
        let creg = (lat > 24.7 && lat < 24.9) ? 1.45 : 1.1;
        let mgi = Math.max(0, Math.pow(rh - 55, 1.3) * (mat * creg * 0.3));
        mgi = Math.min(Math.round(mgi), 100);
        document.getElementById('mgi-value').innerText = mgi;
        document.getElementById('drag_handle').style.background = mgi > 65 ? 'var(--danger)' : (mgi > 30 ? 'var(--warning)' : 'var(--success)');
        document.getElementById('cost-box').innerText = mgi > 65 ? "⚠️ 嚴重風險" : "✅ 穩定環境";
        updateRadar(rh, mgi);
    }

    function triggerPhoto() { document.getElementById('photo_input').click(); }
    document.getElementById('photo_input').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('watermark_canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(20, canvas.height - 150, 450, 120);
                ctx.fillStyle = "white"; ctx.font = "bold 40px sans-serif";
                ctx.fillText(`MGI: ${document.getElementById('mgi-value').innerText} | RH: ${document.getElementById('rh').value}%`, 40, canvas.height - 100);
                ctx.fillText(`${new Date().toLocaleString()}`, 40, canvas.height - 50);
                const link = document.createElement('a'); link.download = `Report_${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9); link.click();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function updateRadar(rh, mgi) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, { type: 'radar', data: { labels: i18n[currentLang].chart, datasets: [{ data: [rh, 50, 50, 50, mgi], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
    }

    async function handleAiDiagnosis() {
        const key = document.getElementById('gemini_key').value;
        const report = document.getElementById('ai-report');
        if (!key) { report.style.display = "block"; report.innerHTML = "<b>本地診斷：</b><br>濕度已達臨界點，請加強角落通風。"; return; }
        report.style.display = "block"; report.innerHTML = "智庫分析中...";
        try {
            const prompt = `分析發霉指數 MGI ${document.getElementById('mgi-value').innerText}, RH ${document.getElementById('rh').value}%. 用繁體中文提供具體建議。`;
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${key}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}) });
            const res = await resp.json();
            report.innerHTML = res.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
        } catch (e) { report.innerHTML = "API 錯誤。"; }
    }

    function saveKeys() { localStorage.setItem('cwa_key', document.getElementById('cwa_key').value); localStorage.setItem('global_key', document.getElementById('global_key').value); localStorage.setItem('gemini_key', document.getElementById('gemini_key').value); }
    
    // --- 🚨 核心：暴力解鎖 iOS 全向拖拽邏輯 ---
    window.onload = function() {
        changeLanguage();
        const dashboard = document.getElementById('dashboard');
        const handle = document.getElementById('drag_handle');
        
        if (window.innerWidth <= 768) {
            let active = false;
            let currentX, currentY, initialX, initialY;
            let xOffset = 0, yOffset = 0;

            handle.addEventListener("pointerdown", dragStart);
            document.addEventListener("pointermove", drag);
            document.addEventListener("pointerup", dragEnd);

            function dragStart(e) {
                // 鎖定 Body 捲動，防止 iOS 下拉更新或頁面滾動
                document.body.style.overflow = "hidden";
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                if (e.target === handle) {
                    active = true;
                    handle.setPointerCapture(e.pointerId);
                }
            }

            function drag(e) {
                if (active) {
                    e.preventDefault(); // 暴力切斷所有瀏覽器預設滑動
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    // 使用 translate 代替 top/left，GPU 加速且不觸發重排
                    dashboard.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            }

            function dragEnd() {
                // 還原 Body 捲動
                document.body.style.overflow = "auto";
                initialX = currentX;
                initialY = currentY;
                active = false;
            }
        }
    };
</script>
</body>
</html>
